<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveVA • SkyBlock Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070a12; color: #f1f5f9; }
        .glass-box { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .glass-box-premium { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8)); backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .mc-gold { color: #FFAA00; }
        @keyframes pulse-subtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .skeleton { animation: pulse-subtle 1.5s infinite; background: rgba(255, 255, 255, 0.06); border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="max-w-5xl mx-auto pt-8 px-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-sky-500 flex items-center justify-center font-black text-slate-950 text-xl">⚡</div>
            <h1 class="text-2xl font-black tracking-wider bg-gradient-to-r from-sky-400 to-purple-400 bg-clip-text text-transparent">LIVEVA.ME</h1>
        </div>
        <form id="searchForm" class="flex w-full md:w-80 glass-box rounded-xl p-1.5 border border-slate-800 focus-within:border-sky-400 transition-all">
            <input type="text" id="pInput" placeholder="Player Username..." class="w-full bg-transparent px-3 py-1.5 text-sm font-semibold outline-none text-white">
            <button type="submit" class="bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold px-4 py-1.5 rounded-lg text-xs uppercase tracking-wider">Inspect</button>
        </form>
    </header>

    <main class="max-w-5xl mx-auto mt-8 px-4">
        <div class="glass-box-premium rounded-3xl p-6 md:p-8 flex flex-col md:flex-row items-center gap-6 shadow-2xl">
            <div class="w-24 h-24 md:w-28 md:h-28 rounded-2xl bg-slate-950/80 border-2 border-slate-700/60 overflow-hidden flex-shrink-0">
                <img id="avatarImg" src="https://mc-heads.net/avatar/LiveBhai/120" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 text-center md:text-left">
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-3 mb-1">
                    <h2 id="uName" class="text-3xl md:text-4xl font-black text-white tracking-tight">Loading...</h2>
                    <span id="pBadge" class="bg-sky-500/20 border border-sky-500/30 text-sky-300 font-bold text-xs px-3 py-1 rounded-full">Profile</span>
                </div>
                <p class="text-slate-400 text-xs md:text-sm font-medium mt-2">
                    SkyBlock Level: <span id="sbLvl" class="text-amber-400 font-bold text-base">0</span> 
                    <span class="mx-2 text-slate-700">•</span> Status: <span id="locStatus" class="text-slate-200 font-semibold">🔴 Offline</span>
                </p>
            </div>
            <div class="glass-box px-6 py-4 rounded-2xl border-slate-700/50 text-center min-w-44">
                <span class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block">Purse Cash</span>
                <span id="purseText" class="text-xl md:text-2xl font-black mc-gold block mt-0.5">0 Coins</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
            <div class="glass-box rounded-3xl p-6 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-extrabold text-slate-400 uppercase tracking-wider">Networth Valuation</span>
                        <span class="text-amber-400 text-lg">💰</span>
                    </div>
                    <div id="nwSkel" class="skeleton h-9 w-3/4 mb-2"></div>
                    <h3 id="nwTotal" class="text-2xl md:text-3xl font-black text-amber-400 tracking-tight hidden">0</h3>
                    <span id="nwUnsoul" class="text-xs text-slate-400 hidden block mt-1">Unsoulbound: <strong class="text-slate-200 font-semibold">...</strong></span>
                </div>
            </div>

            <div class="glass-box rounded-3xl p-6 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-extrabold text-slate-400 uppercase tracking-wider">Accessory Power</span>
                        <span class="text-purple-400 text-lg">🔮</span>
                    </div>
                    <div id="mpSkel" class="skeleton h-9 w-1/2 mb-2"></div>
                    <h3 id="mpTotal" class="text-2xl md:text-3xl font-black text-purple-400 tracking-tight hidden">0</h3>
                    <span id="mpStone" class="text-xs text-slate-400 hidden block mt-1">Power Stone: <strong class="text-purple-300 capitalize">...</strong></span>
                </div>
            </div>

            <div class="glass-box rounded-3xl p-6 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-extrabold text-slate-400 uppercase tracking-wider">True Skill Average</span>
                        <span class="text-sky-400 text-lg">📊</span>
                    </div>
                    <div id="skSkel" class="skeleton h-9 w-1/2 mb-2"></div>
                    <h3 id="skAvg" class="text-2xl md:text-3xl font-black text-sky-400 tracking-tight hidden">0.0</h3>
                </div>
                <div class="mt-5 pt-3 border-t border-slate-800/80 text-xs text-slate-400 truncate">
                    <span>Active Pet: <strong id="aPet" class="text-amber-300 font-bold">...</strong></span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function resetView() {
            ['nw', 'mp', 'sk'].forEach(k => document.getElementById(k + 'Skel').classList.remove('hidden'));
            ['nwTotal','nwUnsoul','mpTotal','mpStone','skAvg'].forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        function loadPlayer(user) {
            document.getElementById('uName').innerText = user;
            document.getElementById('pInput').value = user;
            document.getElementById('avatarImg').src = `https://mc-heads.net/avatar/${user}/120`;
            resetView();

            // SINGLE MASTER REQUEST BEATS 5 ALAG REQUESTS!
            fetch('/api/profile?name=' + encodeURIComponent(user))
            .then(r => r.json()).then(d => {
                if(d.error) { alert(d.error); return; }

                // Banner
                document.getElementById('pBadge').innerText = d.profileName;
                document.getElementById('sbLvl').innerText = d.skyblockLevel;
                document.getElementById('locStatus').innerText = d.statusLocation; // e.g. 🟢 Online (Hub)
                document.getElementById('purseText').innerText = d.purseCoins + " Coins";

                // Networth Card
                document.getElementById('nwSkel').classList.add('hidden');
                document.getElementById('nwTotal').innerText = d.networthFormatted;
                document.querySelector('#nwUnsoul strong').innerText = d.unsoulboundFormatted;
                document.getElementById('nwTotal').classList.remove('hidden');
                document.getElementById('nwUnsoul').classList.remove('hidden');

                // Magic Power Card
                document.getElementById('mpSkel').classList.add('hidden');
                document.getElementById('mpTotal').innerText = d.magicPower;
                document.querySelector('#mpStone strong').innerText = d.powerStone;
                document.getElementById('mpTotal').classList.remove('hidden');
                document.getElementById('mpStone').classList.remove('hidden');

                // Skills Card
                document.getElementById('skSkel').classList.add('hidden');
                document.getElementById('skAvg').innerText = d.skillAverage;
                document.getElementById('aPet').innerText = d.activePet;
                document.getElementById('skAvg').classList.remove('hidden');
            }).catch(e => console.log(e));
        }

        const param = new URLSearchParams(window.location.search).get('name') || 'LiveBhai';
        loadPlayer(param);

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const val = document.getElementById('pInput').value.trim();
            if(val) {
                window.history.pushState({}, '', '/?name=' + encodeURIComponent(val));
                loadPlayer(val);
            }
        });
    </script>
</body>
    </html>
